<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhaskarMath | Quantum Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffcc00;
            --gold-dark: #b8860b;
            --gold-glow: rgba(255, 204, 0, 0.15);
            --bg: #030305;
            --card-bg: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #e2e2e7;
            --text-dim: #88888e;
            --accent: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #particle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            bottom: -50px;
            filter: blur(1px);
            opacity: 0;
            animation: rise linear forwards;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        .container {
            width: 90%;
            max-width: 850px;
            padding: 80px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        .gold-title {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--gold), #fff 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
            letter-spacing: -3px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 15px;
            font-weight: 300;
        }

        .input-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            width: 100%;
            padding: 22px 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: white;
            border-radius: 18px;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 204, 0, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px var(--gold-glow);
        }

        .btn-solve {
            background: var(--accent);
            color: #000;
            padding: 22px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-solve:hover {
            background: var(--gold);
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 204, 0, 0.3);
        }

        .btn-solve:active { transform: scale(0.98); }

        #result-box {
            margin-top: 40px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--border);
            display: none;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .ai-label {
            color: var(--gold);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #ai-text {
            color: var(--text-main);
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 300;
        }

        #ai-text h1, #ai-text h2 { color: var(--gold); margin-top: 30px; font-weight: 700; }
        #ai-text code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 6px; font-size: 0.9em; color: var(--gold); }
        #ai-text pre { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 20px; border: 1px solid var(--border); overflow-x: auto; }

        .loader-container {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 25px;
            opacity: 0.5;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .settings-btn:hover { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

<div id="particle-container"></div>

<div class="container">
    <header>
        <h1 class="gold-title">BhaskarMath</h1>
        <p class="subtitle">QUANTUM MATHEMATICAL SYNTHESIS</p>
    </header>

    <div class="input-card">
        <div class="input-group">
            <input type="text" id="math-prompt" placeholder="Describe your equation or concept..." onkeypress="handleKeyPress(event)">
            <button class="btn-solve" id="btn-main" onclick="askTeacher()">
                <i class="fas fa-atom"></i> PROCESS CORE
            </button>
        </div>
        <center><button class="settings-btn" onclick="resetKey()"><i class="fas fa-key"></i> RESET ACCESS</button></center>
    </div>

    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p style="color: var(--gold); font-size: 0.8rem; letter-spacing: 3px; font-weight: 400;">CALCULATING PROBABILITIES...</p>
    </div>

    <div id="result-box">
        <div class="ai-label">
            <span style="display:inline-block; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold);"></span>
            QUANTITATIVE ANALYSIS SYSTEM
        </div>
        <div id="ai-text"></div>
    </div>
</div>

<script>
    const emojis = ['•', '°', '+', '×', '√', 'π'];
    const container = document.getElementById('particle-container');

    function createParticle() {
        if (document.hidden) return;
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        particle.style.left = Math.random() * 100 + 'vw';
        particle.style.color = Math.random() > 0.5 ? '#ffcc00' : '#ffffff';
        particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
        particle.style.fontSize = (Math.random() * 8 + 10) + 'px';
        container.appendChild(particle);
        setTimeout(() => particle.remove(), 8000);
    }

    setInterval(createParticle, 600);

    let POLLINATIONS_KEY = localStorage.getItem("bhaskarmat_pollinations_key");

    function handleKeyPress(e) {
        if (e.key === 'Enter') askTeacher();
    }

    async function askTeacher() {
        const promptInput = document.getElementById('math-prompt');
        const mathPrompt = promptInput.value;
        const resultBox = document.getElementById('result-box');
        const aiResponseText = document.getElementById('ai-text');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btn-main');

        if (!mathPrompt) {
            promptInput.style.borderColor = "red";
            setTimeout(() => promptInput.style.borderColor = "", 2000);
            return;
        }

        if (!POLLINATIONS_KEY) {
            POLLINATIONS_KEY = prompt("Enter your API Key:");
            if (POLLINATIONS_KEY) localStorage.setItem("bhaskarmat_pollinations_key", POLLINATIONS_KEY);
            else return;
        }

        loader.style.display = "block";
        resultBox.style.display = "none";
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> COMPUTING';

        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${POLLINATIONS_KEY}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are an elite Mathematics Professor. Respond with elegance, clarity, and authority. Use Markdown and LaTeX for formulas. Respond in English." },
                        { role: "user", content: mathPrompt }
                    ],
                    model: "openai"
                })
            });

            if (!response.ok) throw new Error();

            const data = await response.text();
            aiResponseText.innerHTML = marked.parse(data);
            
            loader.style.display = "none";
            resultBox.style.display = "block";
            
        } catch (error) {
            alert("Sync failure with the AI core.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-atom"></i> PROCESS CORE';
        }
    }

    window.resetKey = function() {
        if(confirm("Do you want to reset access keys?")) {
            localStorage.removeItem("bhaskarmat_pollinations_key");
            location.reload();
        }
    }
</script>

</body>
</html>
